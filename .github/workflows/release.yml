name: Release Notes Preview

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  preview:
    name: Generate release notes preview
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes preview
        id: release
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python3 scripts/generate_release.py --notes-file release_notes.md --github-output "$GITHUB_OUTPUT"

      - name: Show release notes preview
        run: cat release_notes.md

      - name: Add preview to job summary
        run: |
          {
            echo "## Release notes preview"
            echo
            cat release_notes.md
            echo
            echo "No tag, GitHub release, or version bump was created."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload release notes preview
        uses: actions/upload-artifact@v4
        with:
          name: release-notes-preview
          path: release_notes.md
