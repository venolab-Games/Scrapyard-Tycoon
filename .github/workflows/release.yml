name: Release

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    name: Release notes preview
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release metadata
        id: release
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python3 scripts/generate_release.py --notes-file release_notes.md --github-output "$GITHUB_OUTPUT"

      - name: Show generated release notes preview
        run: cat release_notes.md

      - name: Confirm manual-only release control
        run: echo "Release notes generated only. This workflow does not create tags or publish GitHub releases."
