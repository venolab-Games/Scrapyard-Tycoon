name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Semantic release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release metadata
        id: release
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python3 scripts/generate_release.py --notes-file release_notes.md --github-output "$GITHUB_OUTPUT"

      - name: Show generated release notes
        if: steps.release.outputs.release_needed == 'true'
        run: cat release_notes.md

      - name: Skip release
        if: steps.release.outputs.release_needed != 'true'
        run: echo "No release needed for these commits."

      - name: Create tag
        if: steps.release.outputs.release_needed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.release.outputs.tag }}"
          git push origin "${{ steps.release.outputs.tag }}"

      - name: Create GitHub release
        if: steps.release.outputs.release_needed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ steps.release.outputs.tag }}" --title "${{ steps.release.outputs.tag }}" --notes-file release_notes.md
